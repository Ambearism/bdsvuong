name: Deploy Development

on:
    workflow_call:
        inputs:
            GKE_CLUSTER:
                description: 'Google Cloud ClusterID'
                required: true
                type: string
            GKE_ZONE:
                description: 'Google Cloud Zone'
                required: true
                type: string
            GCP_PROJECT_ID:
                description: 'Google Cloud Platform ProjectID'
                required: true
                type: string
            DOCKER_FILE:
                description: 'Dockerfile Path To Build Image From'
                required: true
                type: string
            CONTAINER_NAME:
                description: 'Kubernetes Container Name Inside Deployment'
                required: true
                type: string
            DEPLOYMENT_NAME:
                description: 'Kubernetes Deployment Name'
                required: true
                type: string
            REGISTRY:
                description: 'Google Cloud Artifact Registry Name'
                required: true
                type: string
            REGISTRY_REPO_NAME:
                description: 'Google Cloud Artifact Registry Repository Name'
                required: true
                type: string
            IMAGE_NAME:
                description: 'Docker Image Name'
                required: false
                type: string
                default: 'app'
            NAMESPACE:
                description: 'Kubernetes namespace'
                required: false
                type: string
                default: 'bds'
            DOCKER_ENV_FILE_NAME:
                description: 'Application Environment File Name'
                required: true
                type: string
        secrets:
            GCLOUD_AUTH:
                description: 'Google Cloud Platform Auth JSON'
                required: true
            ENV_FILE:
                description: 'Application Environment File'
                required: true

env:
    PROJECT_ID: ${{ inputs.GCP_PROJECT_ID }}
    REGISTRY: ${{ inputs.REGISTRY }}
    REPOSITORY: ${{ inputs.REGISTRY_REPO_NAME }}
    DEPLOYMENT_NAME: ${{ inputs.DEPLOYMENT_NAME }}
    NAMESPACE: ${{ inputs.NAMESPACE }}
    IMAGE_NAME: ${{ inputs.IMAGE_NAME }}
    IMAGE_TAG: ${{ github.sha }}

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            # 1. Checkout source code
            - name: Checkout
              uses: actions/checkout@v5
              with:
                  github-server-url: https://git.hexigon.tech

            # 2. Setup Google Cloud SDK
            - name: Authenticate to Google Cloud
              uses: google-github-actions/auth@v3
              with:
                  credentials_json: ${{ secrets.GCLOUD_AUTH }}

            - name: Set up gcloud
              uses: google-github-actions/setup-gcloud@v3
              with:
                  project_id: ${{ inputs.GCP_PROJECT_ID }}
                  install_components: 'kubectl'

            # 3. Write env file
            - name: Write env file
              run: |
                  echo "${{ secrets.ENV_FILE }}" > ${{ inputs.DOCKER_ENV_FILE_NAME }}

            # 4. Build Next.js & Docker image
            - name: Build Docker image
              run: |
                  docker build \
                    -t $REGISTRY/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:$IMAGE_TAG \
                    -f ${{ inputs.DOCKER_FILE }} . \
                    --platform linux/amd64
                  docker tag $REGISTRY/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:$IMAGE_TAG \
                             $REGISTRY/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:latest

            # 5. Push image lên Artifact Registry
            - name: Push Docker image
              run: |
                  gcloud auth configure-docker $REGISTRY --quiet
                  docker push $REGISTRY/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:$IMAGE_TAG
                  docker push $REGISTRY/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:latest

            # 6. Get GKE credentials
            - name: Get GKE credentials
              run: |
                  gcloud container clusters get-credentials ${{ inputs.GKE_CLUSTER }} \
                    --zone ${{ inputs.GKE_ZONE }} --project $PROJECT_ID

            # 7. Deploy lên Kubernetes
            - name: Deploy to GKE
              run: |
                  kubectl set image deployment/$DEPLOYMENT_NAME \
                    ${{ inputs.CONTAINER_NAME }}=$REGISTRY/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:$IMAGE_TAG \
                    --namespace=$NAMESPACE
                  kubectl rollout status deployment/$DEPLOYMENT_NAME --namespace=$NAMESPACE
