name: CI - Lint & Build

on:
    pull_request:
        branches:
            - develop

jobs:
    lint-and-build:
        runs-on: ubuntu-latest

        steps:
            - name: 🧩 Checkout code
              uses: actions/checkout@v5
              with:
                  github-server-url: https://git.hexigon.tech

            - name: 🧰 Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 23
                  cache: 'npm'

            - name: 📦 Install dependencies
              run: npm ci

            - name: 🔍 Run ESLint
              run: npm run lint -- --max-warnings 0

            - name: 🧱 Build project
              run: npm run build
