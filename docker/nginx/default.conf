server {
  listen 80;
  server_name _;

  root /var/www/html;
  index index.html;

  # React Router fallback
  location / {
    try_files $uri /index.html;
  }

  # Cache static assets
  location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
    expires 6M;
    access_log off;
    add_header Cache-Control "public, immutable";
    try_files $uri /index.html;
  }
}
